name: Bug Report
description: Report a bug in Cortina.D
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: "What happened?"
      placeholder: "Describe the bug clearly"
    validations: { required: true }
  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      placeholder: "1. Go to...\n2. Click...\n3. See error"
    validations: { required: true }
  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
  - type: dropdown
    id: area
    attributes:
      label: "Area"
      options: [Auth, Orders, Menu & Products, Admin Dashboard, Real-time, Rewards, Events, SEO, Performance, Other]
    validations: { required: true }
  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      options: [Critical — app broken, High — major feature broken, Medium — minor issue, Low — cosmetic]
    validations: { required: true }
