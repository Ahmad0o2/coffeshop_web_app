name: Feature Request
description: Suggest a new feature for Cortina.D
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "What problem does this solve?"
      placeholder: "I'm frustrated when..."
    validations: { required: true }
  - type: textarea
    id: solution
    attributes:
      label: "Proposed solution"
    validations: { required: true }
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives you've considered"
  - type: dropdown
    id: area
    attributes:
      label: "Area"
      options: [Customer Experience, Admin Dashboard, Performance, Security, SEO, Developer Experience, Other]
